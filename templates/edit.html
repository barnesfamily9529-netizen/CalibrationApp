{% extends "base.html" %}

{% block title %}Edit Gage - Calibration Gage Manager{% endblock %}

{% block content %}
<section class="form-section">
    <h2>Edit Calibration Gage</h2>

    <form method="post" action="{{ url_for('edit', gage_pk=gage['id']) }}">
        <div class="form-group">
            <label for="gage_id">Gage ID *</label>
            <input type="text" id="gage_id" name="gage_id" required maxlength="100"
                   value="{{ gage['gage_id'] }}">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" maxlength="255"
                   value="{{ gage['description'] or '' }}">
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" maxlength="100"
                   value="{{ gage['location'] or '' }}">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="last_calibration">Last Calibration</label>
                <input type="date" id="last_calibration" name="last_calibration"
                       value="{{ gage['last_calibration'] or '' }}">
            </div>
            <div class="form-group">
                <label for="next_calibration_due">Next Calibration Due</label>
                <input type="date" id="next_calibration_due" name="next_calibration_due"
                       value="{{ gage['next_calibration_due'] or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="Active" {{ 'selected' if gage['status'] == 'Active' else '' }}>Active</option>
                <option value="Inactive" {{ 'selected' if gage['status'] == 'Inactive' else '' }}>Inactive</option>
                <option value="Out for Calibration" {{ 'selected' if gage['status'] == 'Out for Calibration' else '' }}>Out for Calibration</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit">Save Changes</button>
            <a href="{{ url_for('index') }}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
